name: 🐛 Bug Report
description: Report a bug to help improve Legacy's Predator
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill out the details below.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Provide a clear and concise description of the bug.
      placeholder: Describe what happens...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run command '...'
        2. Set config to '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: System Environment Information
      description: Provide version details.
      placeholder: |
        - OS: Windows 11 / Ubuntu 22.04
        - Python version: 3.10.11
        - Node version: 18.16.0
        - Predator version: 0.1.0-alpha
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please copy/paste any relevant log files or terminal logs here (wrap in code blocks).
      render: shell
  - type: checkboxes
    id: checklists
    attributes:
      label: Verification
      options:
        - label: I have searched existing issues to ensure this is not a duplicate bug report.
          required: true
